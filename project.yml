name: ToneVault
options:
  bundleIdPrefix: com.tobyberger
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "" # <-- paste your 10-char Apple Team ID
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  ToneVault:
    type: application
    platform: iOS
    sources:
      - path: ToneVault
    resources:
      - path: Configuration/ToneVault.storekit
      - path: Configuration/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tobyberger.tonevault
        INFOPLIST_FILE: Configuration/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ENABLE_PREVIEWS: YES
        # PrivacyInfo manifest is bundled as a resource of the app target:
    dependencies: []
    entitlements:
      path: Configuration/ToneVault.entitlements
      properties: {}

  ToneVaultTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ToneVaultTests
    dependencies:
      - target: ToneVault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tobyberger.tonevault.tests

schemes:
  ToneVault:
    build:
      targets:
        ToneVault: all
        ToneVaultTests: [test]
    run:
      config: Debug
      # Point the scheme at the local StoreKit config so the paywall works in the simulator:
      storeKitConfiguration: Configuration/ToneVault.storekit
    test:
      config: Debug
      targets:
        - ToneVaultTests
